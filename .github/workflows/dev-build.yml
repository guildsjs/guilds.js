name: Publish Development Build

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: "10"

            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org/

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Generate development version
              id: version
              run: |
                  DEV_VERSION="0.0.0-dev.$(date -u +%Y%m%d%H%M)"
                  echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_ENV
                  echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_OUTPUT
                  node -e "
                    const fs = require('node:fs');
                    const pkgPath = './package/package.json';
                    const pkg = require(pkgPath);
                    pkg.version = '$DEV_VERSION';
                    fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2));
                  "

            - name: Transpile package
              run: pnpm build --filter guilds.js

            - name: Deprecate previous dev version
              run: |
                  node --input-type=module << 'EOF'
                  import { readFile } from 'node:fs/promises';
                  import { execSync } from 'node:child_process';

                  const pkgJson = await readFile('./package/package.json', 'utf8');
                  const { name: pkgName } = JSON.parse(pkgJson);
                  const stdout = execSync(`pnpm view "${pkgName}" versions --json`, { encoding: 'utf8' })

                  await new Promise(resolve => setTimeout(resolve, 3000));

                  console.log('Raw stdout:', stdout);

                  if (!stdout || !stdout.trim()) {
                    console.log('No development version to deprecate.');
                    process.exit(0);
                  }

                  const versions = JSON.parse(stdout);
                  const devVersions = versions.filter((version) => version.includes('-dev.'));
                  const newVersion = process.env.NEW_VERSION;
                  const prev = devVersions.filter((version) => version !== newVersion).pop();

                  if (prev) {
                    console.log(`Deprecating ${pkgName}@${prev}`);

                    execSync(`pnpm deprecate "${pkgName}@${prev}" "outdated dev build"`, { 
                      encoding: 'utf8',
                      env: { ...process.env, NODE_AUTH_TOKEN: process.env.NODE_AUTH_TOKEN },
                    });
                  }

                  EOF
              env:
                  NEW_VERSION: ${{ env.DEV_VERSION }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish package
              working-directory: package
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: pnpm publish --tag dev --access public --no-git-checks
